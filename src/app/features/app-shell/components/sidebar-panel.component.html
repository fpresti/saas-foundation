<app-sidebar-header [showCloseButton]="showCloseButton()" />
<nav class="flex flex-1 flex-col gap-6 overflow-auto p-4" role="navigation" aria-label="Sidebar navigation">
  @for (section of navStore.sections(); track section.id) {
    <div class="flex flex-col gap-1">
      <h3 class="px-3 py-1 text-xs font-semibold uppercase tracking-wider text-[var(--color-text-primary)]/70">
        {{ section.label }}
      </h3>
      <ul class="space-y-1">
        @for (item of section.items; track item.routerLink) {
          <li>
            @if (item.disabled) {
              <span
                class="flex items-center gap-3 rounded px-3 py-2 opacity-50"
                [attr.aria-disabled]="true"
              >
                <app-nav-icon [icon]="item.icon" />
                <span>{{ item.label }}</span>
              </span>
            } @else {
              <a
                [routerLink]="item.routerLink"
                routerLinkActive="nav-active"
                [routerLinkActiveOptions]="{ exact: !!item.exact }"
                class="flex items-center gap-3 rounded px-3 py-2"
              >
                <app-nav-icon [icon]="item.icon" />
                <span>{{ item.label }}</span>
              </a>
            }
          </li>
        }
      </ul>
    </div>
  }
</nav>
