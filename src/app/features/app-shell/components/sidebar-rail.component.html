<aside
  class="fixed inset-y-0 left-0 z-30 hidden w-14 flex-col items-center gap-1 border-r border-[var(--color-border-default)] bg-[var(--color-bg-secondary)] py-4 md:flex"
  role="navigation"
  aria-label="Icon navigation"
>
  <button
    type="button"
    (click)="layoutStore.toggleSidebar()"
    class="rounded p-2 hover:bg-[var(--color-bg-primary)]"
    aria-label="Expand navigation"
  >
    <app-nav-icon icon="chevron-right" />
  </button>
  @for (item of navStore.railItems(); track item.routerLink) {
    @if (item.disabled) {
      <span
        class="flex size-10 items-center justify-center rounded opacity-50"
        [attr.aria-label]="item.label"
        [attr.aria-disabled]="true"
      >
        <app-nav-icon [icon]="item.icon" />
      </span>
    } @else {
      <a
        [routerLink]="item.routerLink"
        routerLinkActive="nav-active"
        [routerLinkActiveOptions]="{ exact: !!item.exact }"
        class="flex size-10 items-center justify-center rounded"
        [attr.aria-label]="item.label"
      >
        <app-nav-icon [icon]="item.icon" />
      </a>
    }
  }
</aside>
