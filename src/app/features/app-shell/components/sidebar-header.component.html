<div class="flex flex-col gap-3 border-b border-[var(--color-border-default)] p-4">
  <div class="flex items-start justify-between gap-2">
  <div class="min-w-0 flex-1 flex flex-col gap-1 truncate">
    <span class="font-semibold truncate">{{ activeTenantName() }}</span>
    <span class="truncate">{{ userName() }}</span>
  </div>
  @if (showCloseButton()) {
    <button
      type="button"
      (click)="layoutStore.closeDrawer()"
      class="shrink-0 rounded p-1 hover:bg-[var(--color-bg-primary)]"
      aria-label="Close menu"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6 6 18" />
        <path d="m6 6 12 12" />
      </svg>
    </button>
  } @else {
    <button
      type="button"
      (click)="layoutStore.toggleSidebar()"
      class="shrink-0 rounded p-1 hover:bg-[var(--color-bg-primary)]"
      aria-label="Collapse sidebar"
    >
      <app-nav-icon icon="chevron-left" />
    </button>
  }
  </div>
  <div class="flex flex-wrap gap-2">
    <ng-content />
    @if (canSwitchTenant()) {
      <button
        type="button"
        (click)="switchTenant()"
        [disabled]="!hasActiveTenant()"
        class="rounded border border-[var(--color-border-default)] px-3 py-1.5"
      >
        Switch tenant
      </button>
    }
    <button
      type="button"
      (click)="signOut()"
      class="rounded border border-[var(--color-border-default)] px-3 py-1.5"
    >
      Sign out
    </button>
  </div>
</div>
