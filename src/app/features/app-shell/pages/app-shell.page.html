<div class="flex min-h-screen bg-[var(--color-bg-primary)]">
  <aside
    class="hidden w-64 shrink-0 flex-col border-r border-[var(--color-border-default)] bg-[var(--color-bg-secondary)] md:flex"
    role="navigation"
    aria-label="Sidebar"
  >
    <app-sidebar-panel />
  </aside>
  <main class="relative flex flex-1 overflow-auto p-6">
    <router-outlet />
    <button
      type="button"
      (click)="layoutStore.openDrawer()"
      class="fixed bottom-6 left-6 z-30 rounded-full border border-[var(--color-border-default)] bg-[var(--color-bg-secondary)] p-3 shadow-lg md:hidden"
      aria-label="Open menu"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" x2="20" y1="12" y2="12" />
        <line x1="4" x2="20" y1="6" y2="6" />
        <line x1="4" x2="20" y1="18" y2="18" />
      </svg>
    </button>
  </main>
</div>
<app-sidebar-drawer />
