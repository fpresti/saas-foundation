<section class="min-h-screen bg-[var(--color-bg-primary)]">
  <div class="flex min-h-screen items-center justify-center p-4">
    <div class="w-full max-w-sm rounded border border-[var(--color-border-default)] bg-[var(--color-bg-secondary)] p-6">
      <h1 class="text-2xl font-bold">Login</h1>

      <form class="mt-4 space-y-4" [formGroup]="magicForm" (ngSubmit)="sendMagicLink()">
        <div>
          <label for="login-magic-email" class="block text-sm">Email</label>
          <input
            id="login-magic-email"
            type="email"
            formControlName="email"
            autocomplete="email"
            class="mt-1 w-full rounded border border-[var(--color-border-default)] bg-[var(--color-bg-primary)] p-2"
          />
        </div>
        @if (magicSuccess()) {
          <p class="text-sm" role="status">Check your email to continue.</p>
        }
        @if (magicError(); as err) {
          <p class="text-sm" role="alert">{{ err.message }}</p>
        }
        <button
          type="submit"
          [disabled]="magicForm.invalid"
          class="w-full rounded border border-[var(--color-border-default)] bg-[var(--color-bg-primary)] p-2 disabled:opacity-50"
        >
          Send magic link
        </button>
      </form>
      <p class="mt-4 text-sm">
        <a routerLink="/sign-up" class="underline">Create account</a>
      </p>
    </div>
  </div>
</section>
