<section class="min-h-screen bg-[var(--color-bg-primary)]">
  <div class="flex min-h-screen items-center justify-center p-4">
    <div class="w-full max-w-sm rounded border border-[var(--color-border-default)] bg-[var(--color-bg-secondary)] p-6">
      <h1 class="text-2xl font-bold">Create account</h1>

      @if (success()) {
        <p class="mt-4 text-sm" role="status">Check your email to continue.</p>
      }

      @if (error(); as err) {
        <p class="mt-4 text-sm" role="alert">{{ err.message }}</p>
      }

      @if (!success()) {
        <form class="mt-4 space-y-4" [formGroup]="form" (ngSubmit)="onSubmit()">
          <div>
            <label for="signup-email" class="block text-sm">Email</label>
            <input
              id="signup-email"
              type="email"
              formControlName="email"
              autocomplete="email"
              class="mt-1 w-full rounded border border-[var(--color-border-default)] bg-[var(--color-bg-primary)] p-2"
            />
          </div>
          <button
            type="submit"
            [disabled]="form.invalid"
            class="w-full rounded border border-[var(--color-border-default)] bg-[var(--color-bg-primary)] p-2 disabled:opacity-50"
          >
            Send magic link
          </button>
        </form>
      }

      <p class="mt-4 text-sm">
        <a routerLink="/login" class="underline">Back to login</a>
      </p>
    </div>
  </div>
</section>
