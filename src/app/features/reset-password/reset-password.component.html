<section class="min-h-screen bg-[var(--color-bg-primary)]">
  <div class="flex min-h-screen items-center justify-center p-4">
    <div
      class="w-full max-w-sm rounded border border-[var(--color-border-default)] bg-[var(--color-bg-secondary)] p-6"
    >
      <h1 class="text-2xl font-bold">Reset password</h1>

      @if (errorMessage(); as msg) {
        <p class="mt-2 text-sm" role="alert">{{ msg }}</p>
      }

      <form class="mt-4 space-y-4" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div>
          <label for="reset-password" class="block text-sm">New password</label>
          <input
            id="reset-password"
            type="password"
            formControlName="password"
            autocomplete="new-password"
            class="mt-1 w-full rounded border border-[var(--color-border-default)] bg-[var(--color-bg-primary)] p-2"
          />
          @if (password.invalid && password.touched) {
            <p class="mt-1 text-sm" role="alert">
              Password must be at least 6 characters.
            </p>
          }
        </div>

        <div>
          <label for="reset-confirm" class="block text-sm"
            >Confirm password</label
          >
          <input
            id="reset-confirm"
            type="password"
            formControlName="confirmPassword"
            autocomplete="new-password"
            class="mt-1 w-full rounded border border-[var(--color-border-default)] bg-[var(--color-bg-primary)] p-2"
          />
          @if (form.hasError('passwordMismatch') && confirmPassword.touched) {
            <p class="mt-1 text-sm" role="alert">Passwords do not match.</p>
          }
        </div>

        <button
          type="submit"
          [disabled]="form.invalid || loading()"
          class="w-full rounded border border-[var(--color-border-default)] bg-[var(--color-bg-primary)] p-2 hover:opacity-90 disabled:opacity-50"
        >
          @if (loading()) {
            Updating…
          } @else {
            Update password
          }
        </button>
      </form>
    </div>
  </div>
</section>
