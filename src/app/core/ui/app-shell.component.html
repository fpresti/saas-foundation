<header class="border-b border-[var(--color-border-default)] bg-[var(--color-bg-secondary)]">
  <div class="flex items-center justify-between p-4">
    <div>
      <span class="font-semibold">
        {{ activeTenantName() }}
      </span>
    </div>

    <div class="flex gap-2">
      @if (canSwitchTenant()) {
        <button
          type="button"
          (click)="switchTenant()"
          [disabled]="!hasActiveTenant()"
          class="rounded border border-[var(--color-border-default)] px-3 py-1"
        >
          Switch tenant
        </button>
      }

      <button
        type="button"
        (click)="signOut()"
        class="rounded border border-[var(--color-border-default)] px-3 py-1"
      >
        Sign out
      </button>
    </div>
  </div>
</header>

<main class="p-6 bg-[var(--color-bg-primary)] min-h-[calc(100vh-64px)]">
  <router-outlet />
</main>
