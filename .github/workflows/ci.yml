name: CI

on:
  push:
    branches: [Genesis, master]
  pull_request:
    branches: [Genesis, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run verify:db-sync
      - run: npm run build
      - run: npm test -- --watch=false

  verify-supabase:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/Genesis'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run verify:all
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEST_OWNER_EMAIL: ${{ secrets.TEST_OWNER_EMAIL }}
          TEST_OWNER_PASSWORD: ${{ secrets.TEST_OWNER_PASSWORD }}
          TEST_INVITEE_EMAIL: ${{ secrets.TEST_INVITEE_EMAIL }}
          TEST_INVITEE_PASSWORD: ${{ secrets.TEST_INVITEE_PASSWORD }}
